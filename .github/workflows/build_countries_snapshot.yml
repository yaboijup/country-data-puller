name: Build Countries Snapshot

on:
  schedule:
    # Runs daily at 02:00 UTC.
    # Election-window countries (election within 7 days) fire every day.
    # Full 44-country weekly refresh fires on Tuesdays — logic is in Python,
    # not here, so the daily schedule must stay to catch Tuesday runs.
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "build_countries_snapshot.py"
      - ".github/workflows/build_countries_snapshot.yml"
      - "requirements.txt"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── 4. Ensure output directory exists ────────────────────────────────────
      - name: Create docs/ directory
        run: mkdir -p docs

      # ── 5. Run the snapshot builder ──────────────────────────────────────────
      - name: Build countries_snapshot.json
        run: python build_countries_snapshot.py
        env:
          PYTHONUNBUFFERED: "1"
          OUTPUT_DIR: "docs"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Set CLAUDE_FORCE_REFRESH=1 to force Claude to re-verify all 44 countries
          # Useful after major world events. Costs ~$0.12 for the full pass.
          CLAUDE_FORCE_REFRESH: ${{ vars.CLAUDE_FORCE_REFRESH || '' }}

      # ── 6. Verify output ──────────────────────────────────────────────────────
      - name: Verify output file
        run: |
          if [ ! -f docs/countries_snapshot.json ]; then
            echo "ERROR: docs/countries_snapshot.json was not created"
            exit 1
          fi
          SIZE=$(wc -c < docs/countries_snapshot.json)
          echo "Output file size: ${SIZE} bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: Output file suspiciously small (${SIZE} bytes)"
            exit 1
          fi
          python -c "
          import json, sys

          with open('docs/countries_snapshot.json') as f:
              data = json.load(f)

          countries = data.get('countries', [])
          print(f'Country count: {len(countries)}')
          print(f'Generated at:  {data.get(\"generatedAt\")}')

          non_competitive_count = 0
          missing_leg_next = []

          for c in countries:
              iso2 = c.get('iso2', '?')
              name = c.get('country', '?')
              elec = c.get('elections', {})
              if elec.get('competitiveElections') is False:
                  non_competitive_count += 1
              else:
                  leg = elec.get('legislative', {})
                  if not leg.get('nextElection'):
                      missing_leg_next.append(f'{name} ({iso2})')

          print(f'Non-competitive countries: {non_competitive_count}')
          print(f'Competitive countries missing nextElection: {len(missing_leg_next)}')
          for m in missing_leg_next:
              print(f'  - {m}')

          first = countries[0]
          print()
          print(f'Spot-check: {first[\"country\"]} ({first[\"iso2\"]})')
          print(f'  headOfState: {first.get(\"executive\", {}).get(\"headOfState\", {}).get(\"name\")}')
          print(f'  competitiveElections: {first.get(\"elections\", {}).get(\"competitiveElections\")}')
          leg = first.get('elections', {}).get('legislative', {})
          last_e = leg.get('lastElection') or {}
          nxt_e  = leg.get('nextElection') or {}
          print(f'  lastElection: {last_e.get(\"date\")} ({last_e.get(\"type\")})')
          print(f'  nextElection: {nxt_e.get(\"date\")} ({nxt_e.get(\"type\")})')
          print('Verification passed.')
          "

      # ── 7. Commit snapshot back to main ───────────────────────────────────────
      - name: Commit updated snapshot to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/countries_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit — snapshot unchanged."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: auto-update countries_snapshot.json [${TIMESTAMP}]"
            # Fetch remote and merge, preferring our freshly-generated JSON
            # if there's a conflict (the newest run always wins).
            git fetch origin main
            git merge -X ours origin/main --no-edit || {
              # If merge fails for any reason, reset and force-push our version
              git merge --abort 2>/dev/null || true
              git push --force-with-lease origin main
              exit 0
            }
            git push origin main
          fi

      # ── 8. Upload artifact for GitHub Pages ───────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  # ── 9. Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
