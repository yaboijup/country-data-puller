name: Build Countries Snapshot

on:
  # Run on a schedule — daily at 02:00 UTC
  schedule:
    - cron: "0 2 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Also run on pushes to main that touch the script or workflow
  push:
    branches:
      - main
    paths:
      - "scripts/build_countries_snapshot.py"
      - ".github/workflows/build_countries_snapshot.yml"

permissions:
  contents: write   # needed to commit the generated JSON back to the repo
  pages: write      # needed for GitHub Pages deployment
  id-token: write   # needed for OIDC-based Pages deployment

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can read the previous snapshot for sticky WB data
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ── 4. Ensure output directory exists ────────────────────────────────────
      - name: Create public/ directory
        run: mkdir -p public

      # ── 5. Run the snapshot builder ──────────────────────────────────────────
      - name: Build countries_snapshot.json
        run: |
          python scripts/build_countries_snapshot.py
        env:
          # No secrets required — all APIs are public
          PYTHONUNBUFFERED: "1"

      # ── 6. Verify output ──────────────────────────────────────────────────────
      - name: Verify output file
        run: |
          if [ ! -f public/countries_snapshot.json ]; then
            echo "ERROR: public/countries_snapshot.json was not created"
            exit 1
          fi
          SIZE=$(wc -c < public/countries_snapshot.json)
          echo "Output file size: ${SIZE} bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: Output file suspiciously small (${SIZE} bytes) — possible build failure"
            exit 1
          fi
          # Pretty-print first country as a sanity check
          python -c "
          import json, sys
          with open('public/countries_snapshot.json') as f:
              data = json.load(f)
          countries = data.get('countries', [])
          print(f'Country count: {len(countries)}')
          if countries:
              first = countries[0]
              print(f'First country: {first[\"country\"]} ({first[\"iso2\"]})')
              print(f'  metadata.capital: {first.get(\"metadata\", {}).get(\"capital\")}')
              print(f'  executive.headOfState.name: {first.get(\"executive\", {}).get(\"headOfState\", {}).get(\"name\")}')
              print(f'  elections.legislative.nextDate: {first.get(\"elections\", {}).get(\"legislative\", {}).get(\"nextDate\")}')
          "

      # ── 7. Commit snapshot back to main (optional — keeps history) ────────────
      # Comment this step out if you only want GitHub Pages deployment, not a
      # committed JSON. Keeping it means the previous snapshot is always available
      # for the sticky World Bank fallback on the next run.
      - name: Commit updated snapshot to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/countries_snapshot.json
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to commit — snapshot unchanged."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: auto-update countries_snapshot.json [${TIMESTAMP}]"
            git push
          fi

      # ── 8. Upload artifact for GitHub Pages ───────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  # ── 9. Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
